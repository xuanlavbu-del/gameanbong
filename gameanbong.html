<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Balls</title>
</head>
<body>
<div>
  <canvas id="canvas">

  </canvas>
</div>
<script>
  // tạo nền để các quả bóng xuất hiện bằng canvas
  let frame = document.getElementById('canvas');
  let drawTool = frame.getContext('2d');

  // khung full màn hình
  frame.width = window.innerWidth;
  frame.height = window.innerHeight;
  frame.style.backgroundColor = 'skyblue';


  let beginX = 40;
  let beginY = 40;

  let moveX = 5;
  let moveY = 1;

  // function draw() {
  //     if (beginX > frame.width - 40 || beginX < 40 || beginY > frame.height - 40 || beginY < 40) {
  //         moveX = - moveX;
  //         moveY = - moveY;
  //     }
  //     if (beginX >= frame.width - 40 || beginY >= frame.height - 40) {
  //         return;
  //     }
  //
  //     beginX += moveX;
  //     beginY += moveY;
  //     requestAnimationFrame(draw);
  //     // vẽ hình tròn
  //     drawTool.clearRect(0, 0, frame.width, frame.height);
  //     drawTool.beginPath();
  //     drawTool.arc(beginX, beginY, 40, 0, 2 * Math.PI);
  //     drawTool.stroke();
  // }
  //
  // draw();

  let FULL_CIRCLE = 2 * Math.PI;
  // ================= RANDOM =================
  function random(min, max) {
    return Math.random() * (max - min) + min;
  }

  function randomSpeed(min, max) {
    let speed = random(min, max);
    return Math.random() < 0.5 ? speed : -speed;
  }


  class Ball {
    constructor(x, y, radius, moveX, moveY, color) {
      this.x = x;
      this.y = y;
      this.radius = radius;
      this.moveX = moveX;
      this.moveY = moveY;
      this.color = color;
      this.mass = radius;
    }

    move() {
      this.attackWall();
      this.x += this.moveX;
      this.y += this.moveY;
      this.draw();
    }

    attackWall() {
      let attackWallX = this.x + this.radius > frame.width || this.x - this.radius < 0;
      let attackWallY = this.y + this.radius > frame.height || this.y - this.radius < 0;
      if (attackWallX) {
        this.moveX = -this.moveX;
      }

      if (attackWallY) {
        this.moveY = -this.moveY;
      }

    }
    draw() {
      drawTool.beginPath();
      drawTool.fillStyle = this.color;
      drawTool.arc(this.x, this.y, this.radius, 0, FULL_CIRCLE);
      drawTool.fill();

      drawTool.strokeStyle = 'black';
      drawTool.stroke();
      drawTool.closePath();
    }

  }
  function resetGame() {
    balls = [];
    for (let i = 0; i < 20; i++) {
      balls.push(createRandomBall(2, 6));
    }

    player.x = frame.width / 2;
    player.y = frame.height / 2;
    player.radius = 50;
  }
  function handleEat(player, ball, index) {
    let dx = ball.x - player.x;
    let dy = ball.y - player.y;
    let distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < player.radius + ball.radius) {
      if (player.radius > ball.radius) {
        // ăn bóng nhỏ
        player.radius += ball.radius * 0.2;
        balls.splice(index, 1);
      } else {
        // thua
        alert("GAME OVER!");
        resetGame();
      }
    }
  }

  function randomColor() {
    return `hsl(${Math.random() * 360}, 70%, 50%)`;
  }




  // ================= TẠO BÓNG RANDOM =================
  function createRandomBall(minSpeed, maxSpeed) {
    let radius = random(20, 55);

    let x = random(radius, frame.width - radius);
    let y = random(radius, frame.height - radius);

    let moveX = randomSpeed(minSpeed, maxSpeed);
    let moveY = randomSpeed(minSpeed, maxSpeed);
    let color = randomColor(); // 🎨 mỗi bóng 1 màu
    return new Ball(x, y, radius, moveX, moveY, color);
  }

  let balls = [];

  //tạo bóng người chơi

  let player = new Ball(
          frame.width / 2,
          frame.height / 2,
          35,
          0,
          0,
          'black'
  );

  // tạo 20 bóng
  for (let i = 0; i < 25;i++) {
    balls.push(createRandomBall(2, 6));
  }

  const keys = {};
  window.addEventListener("keydown", e => keys[e.key] = true);
  window.addEventListener("keyup", e => keys[e.key] = false);

  function movePlayer() {
    let speed = 4;

    if (keys['ArrowUp']) player.y -= speed;
    if (keys['ArrowDown']) player.y += speed;
    if (keys['ArrowLeft']) player.x -= speed;
    if (keys['ArrowRight']) player.x += speed;

    // không cho ra ngoài màn hình
    player.x = Math.max(player.radius, Math.min(frame.width - player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(frame.height - player.radius, player.y));
  }

  // ================= LOOP =================

  function start() {
    drawTool.clearRect(0, 0, frame.width, frame.height);

    movePlayer(); // di chuyển player
    player.draw();  // ✅ vẽ player

    // di chuyển
    balls.forEach(ball => ball.move());

    // kiểm tra va chạm từng cặp
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        handleCollision(balls[i], balls[j]);
      }
    }
    // kiểm tra player ăn bóng
    for (let i = balls.length - 1; i >= 0; i--) {
      handleEat(player, balls[i], i);
    }


    // 🏆 THẮNG
    if (balls.length === 0) {
      alert("YOU WIN 🎉");
      location.reload();
      return;
    }
    requestAnimationFrame(start);
  }


  // hàm va chạm
  function handleCollision(b1, b2) {
    let dx = b2.x - b1.x;
    let dy = b2.y - b1.y;
    let distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < b1.radius + b2.radius) {

      // vector pháp tuyến (normal)
      let nx = dx / distance;
      let ny = dy / distance;

      // vector tiếp tuyến
      let tx = -ny;
      let ty = nx;

      // chiếu vận tốc lên trục pháp tuyến và tiếp tuyến
      let v1n = b1.moveX * nx + b1.moveY * ny;
      let v1t = b1.moveX * tx + b1.moveY * ty;

      let v2n = b2.moveX * nx + b2.moveY * ny;
      let v2t = b2.moveX * tx + b2.moveY * ty;

      // giả sử khác khối lượng → đổi v1n và v2n

      let v1nAfter = (v1n * (b1.mass - b2.mass) + 2 * b2.mass * v2n) / (b1.mass + b2.mass);
      let v2nAfter = (v2n * (b2.mass - b1.mass) + 2 * b1.mass * v1n) / (b1.mass + b2.mass);

      // chuyển lại về vector x,y
      b1.moveX = v1nAfter * nx + v1t * tx;
      b1.moveY = v1nAfter * ny + v1t * ty;

      b2.moveX = v2nAfter * nx + v2t * tx;
      b2.moveY = v2nAfter * ny + v2t * ty;

      // ===== FIX DÍNH (rất quan trọng) =====
      let overlap = b1.radius + b2.radius - distance;
      b1.x -= nx * overlap / 2;
      b1.y -= ny * overlap / 2;
      b2.x += nx * overlap / 2;
      b2.y += ny * overlap / 2;
    }
  }



  start();

</script>
</body>
</html>
